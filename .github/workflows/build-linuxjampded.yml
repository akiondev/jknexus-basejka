name: Build linuxjampded (32-bit)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386 \
            nasm \
            make

      - name: Patch Makefile for modern GCC
        run: |
          cd jediacademy-master/codemp/unix
          # Remove Intel-specific compiler flags that do not exist in GCC:
          #   -Kc++   : Intel C++ mode flag
          #   -use_msasm : Intel MS-style inline assembly
          #   -unroll : Intel unroll pragma
          #   -I/opt/intel/compiler50/ia32/include : Intel include path
          sed -i 's/-Kc++//g; s/-use_msasm//g; s/-unroll//g; s|-I/opt/intel/compiler50/ia32/include||g' makefile

      - name: Build release binaries
        run: |
          cd jediacademy-master/codemp/unix
          make -f makefile release CC="gcc -m32" CXX="g++ -m32" ARCH=i386

      - name: Verify build outputs
        run: |
          ls -la jediacademy-master/run/releasei386/
          file jediacademy-master/run/releasei386/linuxjampded
          file jediacademy-master/run/releasei386/baseq3/jampgamei386.so

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linuxjampded-32bit
          path: |
            jediacademy-master/run/releasei386/linuxjampded
            jediacademy-master/run/releasei386/baseq3/jampgamei386.so
          retention-days: 3

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: linuxjampded-32bit
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/linuxjampded
            ./artifacts/jampgamei386.so
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
